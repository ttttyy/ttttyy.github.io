    <script type="text/javascript">
      //е®ҡд№үиҺ·еҸ–иҜҚиҜӯдёӢж Ү
      var a_idx = 0;
      jQuery(document).ready(function ($) {
        //зӮ№еҮ»bodyж—¶и§ҰеҸ‘дәӢд»¶
        $("body").click(function (e) {
          //йңҖиҰҒжҳҫзӨәзҡ„иҜҚиҜӯ
          var a = new Array("еҜҢејә", "ж°‘дё»", "ж–ҮжҳҺ", "е’Ңи°җ", "иҮӘз”ұ", "е№ізӯү", "е…¬жӯЈ", "жі•жІ»", "зҲұеӣҪ", "ж•¬дёҡ", "иҜҡдҝЎ", "еҸӢе–„");
          //и®ҫзҪ®иҜҚиҜӯз»ҷspanж Үзӯҫ
          var $i = $("<span/>").text(a[a_idx]);
          //дёӢж ҮзӯүдәҺеҺҹжқҘдёӢж Ү+1  дҪҷ иҜҚиҜӯжҖ»ж•°
          a_idx = (a_idx + 1) % a.length;
          //иҺ·еҸ–йј ж ҮжҢҮй’Ҳзҡ„дҪҚзҪ®пјҢеҲҶеҲ«зӣёеҜ№дәҺж–ҮжЎЈзҡ„е·Ұе’ҢеҸіиҫ№зјҳгҖӮ
          //иҺ·еҸ–xе’Ңyзҡ„жҢҮй’Ҳеқҗж Ү
          var x = e.pageX, y = e.pageY;
          //еңЁйј ж Үзҡ„жҢҮй’Ҳзҡ„дҪҚзҪ®з»ҷ$iе®ҡд№үзҡ„spanж Үзӯҫж·»еҠ cssж ·ејҸ
          $i.css({
            "z-index": 999,
            "top": y - 20,
            "left": x,
            "position": "absolute",
            "font-weight": "bold",
            "color": rand_color()
          });
          // йҡҸжңәйўңиүІ
          function rand_color() {
            return "rgb(" + ~~(255 * Math.random()) + "," + ~~(255 * Math.random()) + "," + ~~(255 * Math.random()) + ")"
          }
          //еңЁbodyж·»еҠ иҝҷдёӘж Үзӯҫ
          $("body").append($i);
          //animate() ж–№жі•жү§иЎҢ CSS еұһжҖ§йӣҶзҡ„иҮӘе®ҡд№үеҠЁз”»гҖӮ
          //иҜҘж–№жі•йҖҡиҝҮCSSж ·ејҸе°Ҷе…ғзҙ д»ҺдёҖдёӘзҠ¶жҖҒж”№еҸҳдёәеҸҰдёҖдёӘзҠ¶жҖҒгҖӮCSSеұһжҖ§еҖјжҳҜйҖҗжёҗж”№еҸҳзҡ„пјҢиҝҷж ·е°ұеҸҜд»ҘеҲӣе»әеҠЁз”»ж•ҲжһңгҖӮ
          //иҜҰжғ…иҜ·зңӢhttp://www.w3school.com.cn/jquery/effect_animate.asp
          $i.animate({
            //е°ҶеҺҹжқҘзҡ„дҪҚзҪ®еҗ‘дёҠз§»еҠЁ180
            "top": y - 180,
            "opacity": 0
            //1500еҠЁз”»зҡ„йҖҹеәҰ
          }, 1500, function () {
            //ж—¶й—ҙеҲ°дәҶиҮӘеҠЁеҲ йҷӨ
            $i.remove();
          });
        });
      })
      ;
    </script>
